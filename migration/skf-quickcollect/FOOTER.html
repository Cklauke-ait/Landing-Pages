<!--
  SKF QuickCollect™ landing page — FOOTER payload
  Paste into HubSpot → Page Settings → Advanced Options → FOOTER HTML.
  Safe to leave even if a module is removed; nothing here throws on missing nodes.
-->

<script>
(function () {
  // Adds .is-visible to any .aih-reveal element when it scrolls into view.
  // The fadeInUp keyframe + prefers-reduced-motion fallback live in HEAD.html.
  var nodes = document.querySelectorAll('.aih-lp .aih-reveal');
  if (!nodes.length) return;
  if (!('IntersectionObserver' in window)) {
    nodes.forEach(function (n) { n.classList.add('is-visible'); });
    return;
  }

  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  nodes.forEach(function (n) { io.observe(n); });
})();
</script>
